name: GitHub Trending Daily Report

on:
  schedule:
    # 每天北京时间 07:00 (UTC 23:00) 运行，避开 UTC 午夜高峰
    - cron: "0 23 * * *"
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily report
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          QQ_EMAIL: ${{ secrets.QQ_EMAIL }}
          QQ_EMAIL_AUTH_CODE: ${{ secrets.QQ_EMAIL_AUTH_CODE }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python src/main.py

      - name: Verify generated files
        run: |
          echo "=== Generated files ==="
          ls -la data/reports/ 2>/dev/null || echo "No reports dir"
          ls -la data/trending.db 2>/dev/null || echo "No db file"
          echo "=== Latest report ==="
          ls -t data/reports/daily-6s-*.html 2>/dev/null | head -1 || echo "No 6s report"

      - name: Commit daily reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 强制添加（.gitignore 可能排除了一些文件）
          git add data/reports/ data/trending.db data/repos.json data/subscription.json -f 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Daily report: $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Sync to HF Spaces
        if: success()
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "⚠️ HF_TOKEN not set, skipping HF Spaces sync"
            exit 0
          fi
          echo "🚀 Syncing to HF Spaces..."
          # 克隆 HF Spaces 仓库到临时目录
          git clone https://lue824:${HF_TOKEN}@huggingface.co/spaces/lue824/github-trending-daily /tmp/hf-space || {
            echo "⚠️ HF Spaces clone failed (account may be locked), skipping"
            exit 0
          }
          # 同步所有文件（排除二进制 db、缓存、敏感文件）
          rsync -av \
            --exclude='.git' \
            --exclude='data/trending.db' \
            --exclude='data/raw/' \
            --exclude='data/readmes/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='.claude/' \
            --exclude='.github/' \
            ./ /tmp/hf-space/
          # 提交并推送
          cd /tmp/hf-space
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync to HF Spaces"
          else
            git commit -m "📊 Daily update: $(date -u +%Y-%m-%d)"
            git push || echo "⚠️ HF Spaces push failed, skipping"
            echo "✅ HF Spaces updated successfully"
          fi
