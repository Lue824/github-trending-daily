name: GitHub Trending Daily Report

on:
  schedule:
    # 每天北京时间 07:00 (UTC 23:00) 运行，避开 UTC 午夜高峰
    - cron: "0 23 * * *"
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily report
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          QQ_EMAIL: ${{ secrets.QQ_EMAIL }}
          QQ_EMAIL_AUTH_CODE: ${{ secrets.QQ_EMAIL_AUTH_CODE }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python src/main.py

      - name: Verify generated files
        run: |
          echo "=== Generated files ==="
          ls -la data/reports/ 2>/dev/null || echo "No reports dir"
          ls -la data/trending.db 2>/dev/null || echo "No db file"
          echo "=== Latest report ==="
          ls -t data/reports/daily-6s-*.html 2>/dev/null | head -1 || echo "No 6s report"

      - name: Commit daily reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 强制添加（.gitignore 可能排除了一些文件）
          git add data/reports/ data/trending.db data/subscription.json -f 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Daily report: $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Trigger HF Spaces rebuild (optional)
        if: success()
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 如果配置了 HF_TOKEN，触发 HF Spaces 重新构建
          if [ -n "$HF_TOKEN" ]; then
            echo "Triggering HF Spaces rebuild..."
            # HF Spaces 会自动检测 git 仓库变化并重建（如果配置了 webhook）
            # 这里只是占位，实际重建由 HF Spaces 自动完成
            echo "HF Spaces will auto-rebuild on next access"
          else
            echo "HF_TOKEN not set, skipping HF Spaces trigger"
          fi
