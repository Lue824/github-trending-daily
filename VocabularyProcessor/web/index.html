<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>词汇处理系统</title>
<style>
:root{--bg:#0a0e14;--bg-card:#12171e;--border:#21262d;--text:#e6edf3;--text-dim:#7d8590;--accent:#58a6ff;--green:#3fb950;--orange:#d2991d;--red:#f85149;--radius:8px;--transition:0.2s}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.top-bar{background:var(--bg-card);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.top-bar h1{font-size:1.15em;font-weight:600}
.main{max-width:900px;margin:0 auto;padding:32px 24px}

/* Input */
.input-group{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.input-group input{flex:1;min-width:220px;padding:12px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:1em;outline:none}
.input-group input:focus{border-color:var(--accent)}
.btn{padding:10px 24px;border-radius:var(--radius);border:none;font-size:0.95em;font-weight:600;cursor:pointer;transition:opacity var(--transition)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{opacity:0.9}
.btn-sm{padding:6px 14px;font-size:0.82em}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-dim)}
.btn-outline:hover{border-color:var(--accent);color:var(--text)}

/* Cards */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.card h3{font-size:1em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.result-item{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px}
.result-item .label{font-size:0.76em;color:var(--text-dim)}
.result-item .value{font-size:1.1em;font-weight:600;margin-top:2px}
.result-item .value.green{color:var(--green)}
.result-item .value.red{color:var(--red)}
.result-item .value.orange{color:var(--orange)}

.error-item{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:6px 10px;margin:4px 0;font-size:0.82em}
.suggestions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.suggestion{background:var(--accent);color:#fff;border:none;padding:4px 12px;border-radius:12px;font-size:0.8em;cursor:pointer}
.suggestion:hover{opacity:0.8}

/* Loading */
.spinner{display:none;text-align:center;padding:20px}
.spinner.show{display:block}
.spinner::after{content:"";display:inline-block;width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Tabs */
.tab-bar{display:flex;gap:4px;margin-bottom:24px}
.tab{padding:8px 16px;border:1px solid var(--border);background:var(--bg);color:var(--text-dim);border-radius:6px;cursor:pointer;font-size:0.85em}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Table */
table{width:100%;border-collapse:collapse;font-size:0.85em}
th,td{padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--text-dim);font-weight:600}
tr:hover td{background:var(--bg-hover,#181e27)}

.hidden{display:none}

/* Stats */
.stat-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:24px}
.stat-badge{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;flex:1;min-width:120px}
.stat-badge .num{font-size:1.5em;font-weight:700;color:var(--accent)}
.stat-badge .label{font-size:0.78em;color:var(--text-dim)}
</style>
</head>
<body>
<div class="top-bar"><h1>📝 词汇处理系统 — 拼写检查 + 深度学习</h1></div>
<div class="main">

<div class="tab-bar">
  <button class="tab active" onclick="switchTab(0)">🔍 词汇检查</button>
  <button class="tab" onclick="switchTab(1)">📦 词汇库</button>
  <button class="tab" onclick="switchTab(2)">📊 统计</button>
</div>

<!-- TAB 0: 词汇检查 -->
<div id="tab0">
  <div class="input-group">
    <input type="text" id="wordInput" placeholder="输入一个英文单词...（如：algorith、neural、deep）" onkeydown="if(event.key==='Enter')checkWord()">
    <button class="btn btn-primary" onclick="checkWord()">检查</button>
  </div>
  <div id="spinner" class="spinner"></div>
  <div id="result"></div>

  <div class="card" style="margin-top:24px">
    <h3>📝 批量检查</h3>
    <textarea id="batchInput" rows="4" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:6px;font-family:inherit;font-size:0.9em;resize:vertical" placeholder="每行一个单词"></textarea>
    <button class="btn btn-primary" onclick="batchCheck()" style="margin-top:8px">批量处理</button>
    <div id="batchResult" style="margin-top:12px"></div>
  </div>
</div>

<!-- TAB 1: 词汇库 -->
<div id="tab1" class="hidden">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <h3>📦 已入库词汇</h3>
    <button class="btn btn-outline btn-sm" onclick="loadWords()">🔄 刷新</button>
  </div>
  <div id="wordTable"></div>
</div>

<!-- TAB 2: 统计 -->
<div id="tab2" class="hidden">
  <div id="stats"></div>
  <h3 style="margin-top:24px">📋 最近操作</h3>
  <div id="logs"></div>
</div>

</div>

<script>
var tabs=document.querySelectorAll('.tab');
var panels=[document.getElementById('tab0'),document.getElementById('tab1'),document.getElementById('tab2')];
function switchTab(i){tabs.forEach(function(t,j){t.classList.toggle('active',j===i)});panels.forEach(function(p,j){p.classList.toggle('hidden',j!==i)});if(i===1)loadWords();if(i===2)loadStats()}

async function checkWord(){
  var w=document.getElementById('wordInput').value.trim();
  if(!w)return;
  showSpin();
  try{
    var r=await fetch('/api/check',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({word:w})});
    var d=await r.json();
    renderResult(d);
  }catch(e){document.getElementById('result').innerHTML='<p style="color:var(--red)">请求失败</p>'}
  hideSpin();
}

function renderResult(d){
  var h='<div class="card"><h3>'+(d.phase==='completed'?'✅ ':'')+d.word+'</h3>';
  if(d.spell&&!d.spell.is_correct){
    h+='<div class="result-grid">';
    h+='<div class="result-item"><div class="label">拼写检查</div><div class="value red">❌ 可能有误 ('+d.spell.confidence+'%)</div></div>';
    if(d.spell.errors.length){
      h+='<div class="result-item"><div class="label">错误类型</div>';
      d.spell.errors.forEach(function(e){h+='<div class="error-item">'+e.type+': '+e.detail+'</div>'});
      h+='</div>';
    }
    if(d.spell.suggestions.length){
      h+='<div class="result-item"><div class="label">修正建议</div><div class="suggestions">';
      d.spell.suggestions.forEach(function(s){h+='<button class="suggestion" onclick="checkSuggestion(\''+s+'\')">'+s+'</button>'});
      h+='</div></div>';
    }
    h+='</div>';
  }
  if(d.quality){
     h+='<div class="result-grid">';
     h+='<div class="result-item"><div class="label">领域得分</div><div class="value green">'+d.quality.domain_score+'</div></div>';
     h+='<div class="result-item"><div class="label">综合质量</div><div class="value green">'+d.quality.overall+'</div></div>';
     h+='<div class="result-item"><div class="label">词向量维度</div><div class="value">'+d.vector_dim+'</div></div>';
     h+='<div class="result-item"><div class="label">耗时</div><div class="value">'+d.elapsed_ms+'ms</div></div>';
     h+='</div>';
  }
  if(d.existing){
    h+='<p style="color:var(--accent)">📌 已存在 · 质量分: '+d.existing.quality_score+' · 使用'+d.existing.frequency+'次</p>';
  }
  if(d.error){
    h+='<p style="color:var(--red)">'+d.error+'</p>';
  }
  h+='</div>';
  document.getElementById('result').innerHTML=h;
}

function checkSuggestion(w){
  document.getElementById('wordInput').value=w;
  checkWord();
}

async function batchCheck(){
  var lines=document.getElementById('batchInput').value.split('\n').filter(function(l){return l.trim()});
  if(!lines.length)return;
  showSpin();
  try{
    var r=await fetch('/api/batch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({words:lines})});
    var d=await r.json();
    var h='<table><tr><th>词汇</th><th>状态</th><th>质量分</th><th>耗时</th></tr>';
    d.results.forEach(function(item){
      var status=item.phase==='completed'?'✅ 入库':item.phase==='exists'?'📌 已存在':item.phase==='spellcheck'?'⚠️ 疑似错误':'❌ '+item.phase;
      h+='<tr><td>'+item.word+'</td><td>'+status+'</td><td>'+(item.quality?item.quality.overall:'-')+'</td><td>'+item.elapsed_ms+'ms</td></tr>';
    });
    h+='</table>';
    document.getElementById('batchResult').innerHTML=h;
  }catch(e){document.getElementById('batchResult').innerHTML='<p style="color:var(--red)">请求失败</p>'}
  hideSpin();
}

async function loadWords(){
  try{
    var r=await fetch('/api/words');
    var d=await r.json();
    var h='<table><tr><th>词汇</th><th>质量分</th><th>使用次数</th><th>验证</th><th>入库时间</th></tr>';
    d.forEach(function(w){
      h+='<tr><td><strong>'+w.word+'</strong></td><td>'+(w.quality_score?w.quality_score.toFixed(3):'-')+'</td><td>'+w.frequency+'</td><td>'+(w.is_verified?'✅':'❌')+'</td><td>'+w.created_at+'</td></tr>'
    });
    h+='</table>';
    document.getElementById('wordTable').innerHTML=h;
  }catch(e){}
}

async function loadStats(){
  try{
    var r1=await fetch('/api/stats');var d1=await r1.json();
    var r2=await fetch('/api/logs');var d2=await r2.json();
    document.getElementById('stats').innerHTML=
      '<div class="stat-row">'+
      '<div class="stat-badge"><div class="num">'+d1.total+'</div><div class="label">总词汇</div></div>'+
      '<div class="stat-badge"><div class="num">'+d1.verified+'</div><div class="label">已验证</div></div>'+
      '<div class="stat-badge"><div class="num">'+d1.avg_quality+'</div><div class="label">平均质量</div></div>'+
      '<div class="stat-badge"><div class="num">'+d1.recent_adds+'</div><div class="label">今日新增</div></div>'+
      '</div>';
    var h='<table><tr><th>词汇</th><th>操作</th><th>详情</th><th>时间</th></tr>';
    d2.forEach(function(l){h+='<tr><td>'+l.word+'</td><td>'+l.action+'</td><td>'+l.detail+'</td><td>'+l.created_at+'</td></tr>'});
    h+='</table>';
    document.getElementById('logs').innerHTML=h;
  }catch(e){}
}

function showSpin(){document.getElementById('spinner').classList.add('show');document.getElementById('result').innerHTML=''}
function hideSpin(){document.getElementById('spinner').classList.remove('show')}
</script>
</body>
</html>
