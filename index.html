<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GitHub Trending Daily — 正在跳转</title>
<style>
:root {
  --bg: #0d1117;
  --bg-card: #161b22;
  --border: #30363d;
  --text: #c9d1d9;
  --text-dim: #8b949e;
  --accent: #58a6ff;
  --accent-green: #3fb950;
  --accent-orange: #d2991d;
  --accent-red: #f85149;
  --accent-purple: #a371f7;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background-image:
    radial-gradient(circle at 20% 20%, rgba(88, 166, 255, 0.08), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(163, 113, 247, 0.08), transparent 40%);
}
.card {
  max-width: 540px;
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 32px;
  text-align: center;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  animation: fadeInUp 0.6s ease;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.badge {
  display: inline-block;
  padding: 4px 12px;
  background: rgba(88, 166, 255, 0.15);
  color: var(--accent);
  border-radius: 12px;
  font-size: 0.78em;
  font-weight: 600;
  margin-bottom: 16px;
  letter-spacing: 0.5px;
}
h1 {
  font-size: 1.6em;
  margin-bottom: 8px;
  background: linear-gradient(90deg, var(--accent), var(--accent-purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.subtitle {
  color: var(--text-dim);
  font-size: 0.9em;
  margin-bottom: 24px;
}
.status {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: rgba(63, 185, 80, 0.1);
  border: 1px solid rgba(63, 185, 80, 0.3);
  border-radius: 20px;
  margin-bottom: 24px;
  font-size: 0.85em;
}
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent-green);
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.3); }
}
.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 20px;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
.url-box {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  margin: 16px 0;
  font-family: "SFMono-Regular", Consolas, monospace;
  font-size: 0.82em;
  color: var(--accent);
  word-break: break-all;
  cursor: pointer;
  transition: border-color 0.2s;
}
.url-box:hover { border-color: var(--accent); }
.url-label {
  color: var(--text-dim);
  font-size: 0.75em;
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.btn {
  display: inline-block;
  padding: 12px 32px;
  background: linear-gradient(90deg, var(--accent), var(--accent-purple));
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 0.95em;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  transition: transform 0.2s, box-shadow 0.2s;
  margin-top: 8px;
}
.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(88, 166, 255, 0.4);
}
.btn:active { transform: translateY(0); }
.meta {
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  font-size: 0.78em;
  color: var(--text-dim);
  line-height: 1.8;
}
.meta span { color: var(--accent); }
.error {
  display: none;
  padding: 12px 16px;
  background: rgba(248, 81, 73, 0.1);
  border: 1px solid rgba(248, 81, 73, 0.3);
  border-radius: 8px;
  color: var(--accent-red);
  font-size: 0.85em;
  margin: 16px 0;
}
.features {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin: 20px 0;
  font-size: 0.78em;
}
.feature {
  padding: 8px;
  background: var(--bg);
  border-radius: 6px;
  border: 1px solid var(--border);
}
.feature-icon { font-size: 1.4em; display: block; margin-bottom: 4px; }
.feature-text { color: var(--text-dim); }
</style>
</head>
<body>
<div class="card">
  <span class="badge">🏆 TRAE AI 创造力大赛</span>
  <h1>GitHub Trending Daily</h1>
  <p class="subtitle">GitHub 热门项目智能日报系统</p>

  <div class="status" id="statusBox">
    <span class="status-dot"></span>
    <span id="statusText">正在获取最新访问地址...</span>
  </div>

  <div class="spinner" id="spinner"></div>

  <div class="error" id="errorBox"></div>

  <div class="url-label" id="urlLabel" style="display:none">当前访问地址</div>
  <div class="url-box" id="urlBox" style="display:none" onclick="window.open(this.textContent, '_blank')"></div>

  <a href="#" class="btn" id="goBtn" style="display:none" target="_blank">立即访问 →</a>

  <div class="features">
    <div class="feature">
      <span class="feature-icon">📊</span>
      <span class="feature-text">6 板块日报</span>
    </div>
    <div class="feature">
      <span class="feature-icon">🔧</span>
      <span class="feature-text">自定义查询</span>
    </div>
    <div class="feature">
      <span class="feature-icon">🏗️</span>
      <span class="feature-text">架构展示</span>
    </div>
  </div>

  <div class="meta">
    <div>📅 最后更新：<span id="updatedAt">--</span></div>
    <div>🔄 本页面地址永久固定，自动跳转到最新服务地址</div>
    <div>💡 服务由 Cloudflare Tunnel 提供，URL 可能随重启变化</div>
  </div>
</div>

<script>
const REDIRECT_FILE = './redirect.json';
const COUNTDOWN_SECONDS = 3;

function showError(msg) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('errorBox').style.display = 'block';
  document.getElementById('errorBox').textContent = msg;
  document.getElementById('statusBox').style.background = 'rgba(248, 81, 73, 0.1)';
  document.getElementById('statusBox').style.borderColor = 'rgba(248, 81, 73, 0.3)';
  document.getElementById('statusText').textContent = '获取地址失败';
  document.querySelector('.status-dot').style.background = 'var(--accent-red)';
}

function showSuccess(url, updatedAt) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('urlBox').textContent = url;
  document.getElementById('urlBox').style.display = 'block';
  document.getElementById('urlLabel').style.display = 'block';
  document.getElementById('urlBox').style.display = 'block';
  const btn = document.getElementById('goBtn');
  btn.href = url;
  btn.style.display = 'inline-block';
  document.getElementById('updatedAt').textContent = updatedAt || '未知';
  document.getElementById('statusText').textContent = COUNTDOWN_SECONDS + ' 秒后自动跳转...';

  let count = COUNTDOWN_SECONDS;
  const timer = setInterval(() => {
    count--;
    if (count > 0) {
      document.getElementById('statusText').textContent = count + ' 秒后自动跳转...';
    } else {
      clearInterval(timer);
      document.getElementById('statusText').textContent = '正在跳转...';
      window.location.href = url;
    }
  }, 1000);
}

fetch(REDIRECT_FILE, { cache: 'no-store' })
  .then(r => {
    if (!r.ok) throw new Error('配置文件不存在 (HTTP ' + r.status + ')');
    return r.json();
  })
  .then(data => {
    const url = (data.url || '').trim();
    if (!url || !url.startsWith('http')) {
      throw new Error('redirect.json 中未配置有效的 url 字段');
    }
    showSuccess(url, data.updated_at);
  })
  .catch(err => {
    showError('无法读取最新地址：' + err.message + '。请稍后刷新重试，或联系作者更新 redirect.json');
  });
</script>
</body>
</html>
